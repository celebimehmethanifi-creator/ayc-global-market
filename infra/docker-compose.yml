version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: neura_postgres
    environment:
      POSTGRES_USER: neura
      POSTGRES_PASSWORD: neura_dev
      POSTGRES_DB: neura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neura_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build: ../services/gateway
    container_name: neura_gateway
    env_file:
      - path: ../.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/gateway:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  data-service:
    build: ../services/data-service
    container_name: neura_data
    env_file:
      - path: ../.env
        required: false
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/data-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  ai-service:
    build: ../services/ai-service
    container_name: neura_ai
    env_file:
      - path: ../.env
        required: false
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/ai-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  signal-service:
    build: ../services/signal-service
    container_name: neura_signal
    env_file:
      - path: ../.env
        required: false
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../services/signal-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  postgres_data:
  redis_data:
